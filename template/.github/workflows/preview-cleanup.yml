# Tear down per-PR preview Workers created by preview.yml when the PR closes.
#
# Same DO detection as preview.yml — if the project doesn't use DOs there's no
# preview Worker to delete, so the cleanup job is skipped.

name: PR preview cleanup (Durable Objects fallback)

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_do: ${{ steps.parse.outputs.has_do }}
      worker_name: ${{ steps.parse.outputs.worker_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - id: parse
        run: |
          node -e '
            const fs = require("fs");
            const raw = fs.readFileSync("wrangler.jsonc", "utf8")
              .replace(/\/\*[\s\S]*?\*\//g, "")
              .replace(/(^|[^:])\/\/.*$/gm, "$1");
            const cfg = JSON.parse(raw);
            const hasDo = (cfg.durable_objects?.bindings?.length ?? 0) > 0;
            const out = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(out, `has_do=${hasDo}\n`);
            fs.appendFileSync(out, `worker_name=${cfg.name}\n`);
          '

  cleanup:
    needs: detect
    if: >-
      needs.detect.outputs.has_do == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_NAME: ${{ needs.detect.outputs.worker_name }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Delete preview Worker
        run: |
          PREVIEW_NAME="${WORKER_NAME}-pr-${PR_NUMBER}"
          echo "Deleting $PREVIEW_NAME ..."
          bunx wrangler delete --name "$PREVIEW_NAME" --force || \
            echo "Worker $PREVIEW_NAME not found (already deleted) — continuing."

      - name: Find preview comment
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- preview-deploy-marker -->

      - name: Mark preview as torn down
        if: steps.find_comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- preview-deploy-marker -->
            **Preview torn down** — Worker `${{ env.WORKER_NAME }}-pr-${{ env.PR_NUMBER }}` was deleted when this PR closed.
