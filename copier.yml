_min_copier_version: "9.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

_exclude:
  - "node_modules"
  - "**/node_modules"
  - ".wrangler"
  - "**/.wrangler"
  - "web/dist"
  - "worker-configuration.d.ts"
  - ".dev.vars"
  - ".cf-env.sh"

_tasks:
  - "bun install"
  - ["bash", "-c", "cd web && bun install && bun run build"]
  - "bunx wrangler types"

_message_after_copy: |
  Project generated. All project commands are mise tasks.

  Next steps:
    mise install              # install bun + node per mise.toml
    mise run setup            # bun install in root + web/, seed .dev.vars
    bunx wrangler login       # one-time CF auth
    mise run d1:create        # create the remote D1; paste the id into wrangler.jsonc
    mise run migrate:local
    mise run dev              # http://localhost:8787

  `mise tasks` lists everything else (auth:generate, db:generate,
  migrate:remote, secret:put, deploy). See CLAUDE.md for architecture.

project_slug:
  type: str
  help: "Project slug (kebab-case). Used for Cloudflare Worker name and package.json name."
  placeholder: "my-auth-app"
  validator: >-
    {% if not (project_slug | regex_search('^[a-z][a-z0-9-]*$')) -%}
    Must be lowercase letters, digits, and hyphens, starting with a letter.
    {%- endif %}

app_title:
  type: str
  help: "Human-readable app name shown in the page title and login card."
  default: "{{ project_slug | replace('-', ' ') | title }}"

app_tagline:
  type: str
  help: "One-line description shown under the app title in the login card."
  default: "Hono worker, Drizzle adapter, Cloudflare D1."

worker_name:
  type: str
  help: "Cloudflare Worker name (appears in *.workers.dev subdomain)."
  default: "{{ project_slug }}"

d1_database_name:
  type: str
  help: "Cloudflare D1 database name."
  default: "{{ project_slug }}-db"
