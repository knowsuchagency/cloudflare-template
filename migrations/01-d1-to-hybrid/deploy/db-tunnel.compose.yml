# Mode 2 / Mode 3 database layer.
#
# Deploys a Dokploy-managed postgres with TLS (required by Hyperdrive) and a
# cloudflared sidecar that exposes the DB via a Cloudflare Tunnel for
# Hyperdrive-over-Access consumers. When running in Mode 3 (Bun app alongside)
# the app reaches postgres directly over dokploy-network; the cloudflared
# service is still useful (e.g. for remote psql or Worker fallback) but can be
# removed if you don't want the tunnel.
#
# Expected Dokploy env vars:
#   POSTGRES_USER       — postgres superuser
#   POSTGRES_PASSWORD   — postgres superuser password
#   POSTGRES_DB         — initial database name
#   TUNNEL_TOKEN        — cloudflared TUNNEL_TOKEN (see scripts/cf-setup.py)

services:
  pg-tls-init:
    image: alpine/openssl:latest
    # Runs once on first boot to seed a self-signed TLS cert into the pg-tls
    # volume. The postgres container mounts that volume read-only and starts
    # with `ssl=on` pointing at the cert.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ ! -f /tls/server.key ]; then
          openssl req -new -x509 -days 3650 -nodes \
            -subj "/CN=postgres" \
            -out /tls/server.crt -keyout /tls/server.key
          chmod 600 /tls/server.key
          chmod 644 /tls/server.crt
          # postgres:17 runs as uid/gid 999 in the official image.
          chown 999:999 /tls/server.key /tls/server.crt
        fi
    volumes:
      - pg-tls:/tls
    restart: "no"

  postgres:
    image: postgres:17
    restart: unless-stopped
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/etc/pg-tls/server.crt
      - -c
      - ssl_key_file=/etc/pg-tls/server.key
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - pg-tls:/etc/pg-tls:ro
    depends_on:
      pg-tls-init:
        condition: service_completed_successfully
    networks:
      default:
      dokploy-network:
        aliases:
          # Stable alias on dokploy-network so app.compose.yml's DATABASE_URL
          # doesn't need to know Dokploy's auto-generated project appName.
          # Replace PROJECT_SLUG with your project's kebab-case slug.
          - PROJECT_SLUG-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

volumes:
  pg-data:
  pg-tls:

networks:
  dokploy-network:
    external: true
